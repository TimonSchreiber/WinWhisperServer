<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WinWhisperServer - Speech to Text</title>

  <link rel="stylesheet" href="material-icons.css">
  <link rel="stylesheet" href="style.css">
  <script type="module" src="app.js"></script>
</head>

<body>
  <div class="container">
    <h1>WinWhisperServer</h1>
    <p>Speech-to-text transcription powered by Faster Whisper XXL</p>

    <div class="file-select-area" id="fileSelectArea">
      <p>Drag & drop an audio file here, or click to select one.</p>
      <input type="file" name="fileInput" id="fileInput" accept="audio/*,.wav,.mp3,.m4a,.flac,.ogg">
      <button class="btn" id="browseBtn">Select Audio File</button>
    </div>

    <div id="fileName"></div>

    <button class="btn" id="transcribeBtn" disabled>
      Upload & Transcribe
      <span class="spinner"></span>
    </button>

    <div id="result"></div>
  </div>
</body>
